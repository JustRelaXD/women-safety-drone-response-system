<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mangalore Routing Command</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030712;
        color: #f8fafc;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.72);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.5;
      }

      code {
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mangalore Routing Command</h1>
      <p>Build the React app with <code>npm run build</code>, then restart <code>npm start</code> to serve the premium MapLibre experience.</p>
    </main>
  </body>
</html>
